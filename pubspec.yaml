name: encryption_caeser_vigenere
description: "A premium Flutter app demonstrating Caesar and Vigenère classical encryption algorithms with English and Arabic support."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.0
  go_router: ^14.6.2
  get_it: ^8.0.3
  google_fonts: ^6.2.1
  slang: ^4.9.0
  slang_flutter: ^4.9.0
  equatable: ^2.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  slang_build_runner: ^4.9.0

flutter:
  uses-material-design: true
  generate: true
